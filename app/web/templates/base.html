<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fichajes Global Meats{% endblock %}</title>
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/vendor/alpine.min.js" defer></script>
  <link rel="preload" as="font" type="font/woff2"
        href="/static/fonts/public-sans-400.woff2" crossorigin>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <strong>Fichajes Global Meats</strong>
    <nav>
      {% if claims %}
        <a href="/fichar">Fichar</a>
        <a href="/mis-registros">Mis registros</a>
        <a href="/mis-ausencias">Mis ausencias</a>
        {% if claims.role in oversight_roles %}<a href="/admin">Administración</a>{% endif %}
        <a href="/logout">Salir</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
